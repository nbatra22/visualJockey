name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject Gemini API key into app.js
        run: sed -i "s/const GEMINI_API_KEY = \".*\"/const GEMINI_API_KEY = \"${{ secrets.GEMINI_API_KEY }}\"/" app.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
